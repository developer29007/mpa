services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  kafka:
    image: bitnami/kafka:3.7
    environment:
      # KRaft mode — no ZooKeeper needed
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_DB: mpa
      POSTGRES_USER: mpa
      POSTGRES_PASSWORD: mpa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpa -d mpa"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python services ───────────────────────────────────────────────────────────

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8001
    environment:
      MPA_DSN: postgresql://mpa:mpa@postgres:5432/mpa
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  db-consumer:
    build: .
    command: >
      python -m consumers.db_consumer
      --date ${ITCH_DATE:-10302019}
      --kafka kafka:9092
      --dsn postgresql://mpa:mpa@postgres:5432/mpa
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  itch-runner:
    build: .
    command: bash scripts/start_itch.sh
    environment:
      ITCH_DATE: ${ITCH_DATE:-10302019}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # ITCH_STOCKS: AAPL TSLA MSFT   # uncomment to filter; leave unset for all stocks
    volumes:
      # Mount your local ./data directory so the ITCH file is accessible.
      # The start script will download from NASDAQ if the file isn't present.
      - ./data:/app/data
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
  postgres_data:
